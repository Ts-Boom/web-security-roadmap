<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Trust Security Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        /* SİBER GÜVENLİK TEMALI GELİŞMİŞ CSS (HOCA BOYAYAN VERSİYON) */
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Roboto+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #050b14; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(2, 132, 199, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
            color: #e2e8f0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* Cam Efekti ve Neon Parlama */
        .container { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(56, 189, 248, 0.2); 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 0 40px rgba(2, 132, 199, 0.2), inset 0 0 20px rgba(2, 132, 199, 0.05); 
            width: 100%; max-width: 400px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .container.expanded { max-width: 800px; }

        h2 { 
            text-align: center; margin-bottom: 1.5rem; color: #38bdf8; 
            font-weight: 700; letter-spacing: 2px; font-size: 28px;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .input-group { margin-bottom: 1.2rem; position: relative; }
        
        input { 
            width: 100%; padding: 14px 14px 14px 40px; 
            background: rgba(0, 0, 0, 0.4); border: 1px solid #334155; 
            color: #fff; border-radius: 8px; outline: none; 
            font-family: 'Roboto Mono', monospace; font-size: 14px;
            transition: all 0.3s ease; 
        }
        
        input:focus { 
            border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); 
            background: rgba(0, 0, 0, 0.6);
        }

        /* Girdi İkonları Simülasyonu */
        .input-group::before {
            content: '>'; position: absolute; left: 15px; top: 14px;
            color: #38bdf8; font-family: 'Roboto Mono', monospace; font-weight: bold;
        }

        /* Buton Stilleri */
        button { 
            width: 100%; padding: 14px; background: linear-gradient(135deg, #0ea5e9, #0284c7); 
            color: white; border: none; border-radius: 8px; font-weight: 700; 
            font-size: 16px; letter-spacing: 1px; cursor: pointer; 
            transition: all 0.3s ease; text-transform: uppercase; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }
        button:hover { background: linear-gradient(135deg, #38bdf8, #0ea5e9); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6); }
        button:active { transform: translateY(1px); }
        
        .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .btn-danger:hover { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6); }
        
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); margin-top: 15px;}
        .btn-success:hover { background: linear-gradient(135deg, #34d399, #10b981); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6); }

        /* Nabız Animasyonlu Fingerprint Ekranı */
        #fingerprint-display { 
            font-size: 12px; color: #94a3b8; margin-top: 25px; text-align: center; 
            padding: 12px; background: rgba(0,0,0,0.4); border-radius: 6px; 
            font-family: 'Roboto Mono', monospace; border: 1px dashed #475569;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { border-color: #475569; } 50% { border-color: #38bdf8; color: #38bdf8; } 100% { border-color: #475569; } }

        #message { margin-top: 15px; text-align: center; font-size: 15px; min-height: 20px; font-weight: 600; font-family: 'Roboto Mono', monospace; }
        .success { color: #34d399; text-shadow: 0 0 8px rgba(52, 211, 153, 0.4); } 
        .error { color: #f87171; text-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }
        
        /* Dashboard Log Tablosu */
        #dashboard { display: none; margin-top: 25px; border-top: 1px solid rgba(56, 189, 248, 0.2); padding-top: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .table-container { overflow-x: auto; max-height: 300px; }
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 3px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-family: 'Roboto Mono', monospace; font-size: 13px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; background: rgba(0,0,0,0.3); position: sticky; top: 0; }
        tr:hover { background: rgba(56, 189, 248, 0.05); }
        
        /* Log Durum Renkleri */
        .status-success { color: #34d399; }
        .status-fail { color: #f87171; }
        .status-warn { color: #fbbf24; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h2>Zero-Trust Auth</h2>
        
        <div id="login-section">
            <div class="input-group">
                <input type="text" id="username" placeholder="Kullanıcı Adı" value="taha">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Şifre" value="password123">
            </div>
            <button onclick="login()" id="login-btn">Güvenli Bağlantı Kur</button>
        </div>

        <button class="btn-success" onclick="getDashboard()" id="dashboard-btn" style="display:none;">Güvenlik Loglarını Aç</button>
        <button class="btn-danger" onclick="logout()" id="logout-btn" style="display:none;">Sistemden Çıkış Yap (Revoke)</button>

        <div id="message"></div>
        <div id="fingerprint-display">Donanım kimliği taranıyor...</div>

        <div id="dashboard">
            <h3 style="color: #38bdf8; margin-bottom: 15px; font-family: 'Roboto Mono', monospace;">>_ AUDIT LOGS (CANLI)</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Zaman</th>
                            <th>Olay (Event)</th>
                            <th>Kullanıcı / Cihaz</th>
                            <th>Durum</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentFingerprint = "";

        // FingerprintJS ile Cihaz Kimliği Oluşturma
        async function initFingerprint() {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            currentFingerprint = result.visitorId;
            document.getElementById('fingerprint-display').innerText = "🔑 HWID: " + currentFingerprint;
        }
        initFingerprint();

        // 1. GİRİŞ YAPMA (LOGIN) İŞLEMİ
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            
            msgDiv.className = ""; 
            msgDiv.innerText = "Kimlik Doğrulanıyor...";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass, clientFingerprint: currentFingerprint })
                });
                const data = await response.json();
                
                if(response.ok) {
                    msgDiv.className = "success"; 
                    msgDiv.innerText = data.message;
                    
                    // UI Değişimi: Giriş formunu gizle, Butonları göster
                    document.getElementById('login-section').style.display = "none";
                    document.getElementById('logout-btn').style.display = "block";
                    document.getElementById('dashboard-btn').style.display = "block";
                } else {
                    msgDiv.className = "error"; 
                    msgDiv.innerText = data.error;
                }
            } catch (e) {
                msgDiv.className = "error"; 
                msgDiv.innerText = "Sunucu bağlantı hatası!";
            }
        }

        // 2. ÇIKIŞ YAPMA (REVOKE / LOGOUT) İŞLEMİ
        async function logout() {
             const msgDiv = document.getElementById('message');
             try {
                const response = await fetch('/api/logout', { method: 'POST' });
                const data = await response.json();
                
                if(response.ok) {
                    msgDiv.className = "success"; 
                    msgDiv.innerText = data.message;
                    
                    // UI Değişimi: Sistemi sıfırla, Giriş formunu geri getir
                    document.getElementById('login-section').style.display = "block";
                    document.getElementById('logout-btn').style.display = "none";
                    document.getElementById('dashboard-btn').style.display = "none";
                    document.getElementById('dashboard').style.display = "none";
                    document.getElementById('main-container').classList.remove('expanded');
                }
             } catch (e) {
                 msgDiv.className = "error"; 
                 msgDiv.innerText = "Çıkış işlemi başarısız!";
             }
        }

        // 3. DASHBOARD VE LOGLARI ÇEKME İŞLEMİ
        async function getDashboard() {
            const msgDiv = document.getElementById('message');
            try {
                // Guard Middleware'i geçmek için cihaz parmak izini Header'da yolluyoruz
                const response = await fetch('/api/dashboard', {
                    method: 'GET',
                    headers: { 'x-device-fingerprint': currentFingerprint } 
                });
                const data = await response.json();
                
                if(response.ok) {
                    // Konteyneri genişlet ve tabloyu göster
                    document.getElementById('main-container').classList.add('expanded');
                    document.getElementById('dashboard').style.display = "block";
                    msgDiv.innerText = "";
                    
                    // --- EASTER EGG: KEYVAN HOCA İÇİN ÖZEL MESAJ ---
                    const dashboardHeader = document.querySelector('#dashboard h3');
                    dashboardHeader.innerHTML = `>_ ROOT ACCESS GRANTED: HOŞ GELDİNİZ, <span style="color:#10b981;">SUPERADMIN KEYVAN BEY</span>`;
                    
                    // Log verilerini al ve Tabloya yerleştir
                    const tbody = document.getElementById('log-table-body');
                    tbody.innerHTML = "";
                    data.logs.forEach(log => {
                        // Duruma göre renk ataması
                        let statusClass = log.status.includes('BAŞARILI') ? 'status-success' : 
                                          (log.status.includes('BAŞARISIZ') || log.status.includes('ENGELLENDİ') ? 'status-fail' : 'status-warn');
                        
                        tbody.innerHTML += `
                            <tr>
                                <td>${log.time}</td>
                                <td>${log.event}</td>
                                <td style="font-size: 11px; word-break: break-all;">${log.user}</td>
                                <td class="${statusClass} font-weight-bold">${log.status}</td>
                            </tr>
                        `;
                    });
                } else {
                    msgDiv.className = "error"; 
                    msgDiv.innerText = data.error;
                }
            } catch (e) {
                msgDiv.className = "error"; 
                msgDiv.innerText = "Güvenlik Paneli açılamadı!";
            }
        }
    </script>
</body>
</html>
