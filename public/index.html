<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Giriş | Device Fingerprint</title>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #45a049; }
        #fingerprint-display { font-size: 12px; color: #666; margin-top: 15px; word-break: break-all; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Güvenli Giriş</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı (taha)" value="taha">
        <input type="password" id="password" placeholder="Şifre (password123)" value="password123">
        <button onclick="login()">Giriş Yap</button>
        
        <br><br><hr><br>
        <button style="background: #2196F3;" onclick="getDashboard()">Gizli Paneli Aç (Test)</button>
        <div id="message"></div>
        <div id="fingerprint-display">Cihaz Parmak İzi Hesaplanıyor...</div>
    </div>

    <script>
        let currentFingerprint = "";

        async function initFingerprint() {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            currentFingerprint = result.visitorId;
            document.getElementById('fingerprint-display').innerText = "Cihaz ID: " + currentFingerprint;
        }

        initFingerprint();

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass, clientFingerprint: currentFingerprint })
                });
                const data = await response.json();
                msgDiv.style.color = response.ok ? "green" : "red";
                msgDiv.innerText = data.message || data.error;
            } catch (e) {
                msgDiv.innerText = "Sunucuya bağlanılamadı!";
            }
        }

        // --- YENİ EKLENEN FONKSİYON ---
        async function getDashboard() {
            const msgDiv = document.getElementById('message');
            try {
                const response = await fetch('/api/dashboard', {
                    method: 'GET',
                    // Guard'ın kontrol etmesi için güncel cihaz parmak izini header'da yolluyoruz
                    headers: { 'x-device-fingerprint': currentFingerprint } 
                });
                const data = await response.json();
                msgDiv.style.color = response.ok ? "blue" : "red";
                msgDiv.innerText = data.message ? JSON.stringify(data) : data.error;
            } catch (e) {
                msgDiv.innerText = "Panel açılamadı!";
            }
        }
    </script>
</body>
</html>
