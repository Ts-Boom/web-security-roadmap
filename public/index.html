<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Trust Security Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a); }
        .container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 2.5rem; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; transition: all 0.3s ease; }
        .container.expanded { max-width: 700px; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #38bdf8; font-weight: 600; letter-spacing: 1px; }
        .input-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 6px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.1s; margin-top: 10px; }
        button:hover { background: #0284c7; }
        button:active { transform: scale(0.98); }
        .btn-danger { background: #10b981; margin-top: 15px; }
        .btn-danger:hover { background: #059669; }
        #fingerprint-display { font-size: 11px; color: #94a3b8; margin-top: 20px; text-align: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 4px; font-family: monospace; }
        #message { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; }
        .success { color: #34d399; } .error { color: #f87171; }
        
        /* Dashboard Log Tablosu */
        #dashboard { display: none; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h2>Zero-Trust Auth</h2>
        <div id="login-section">
            <div class="input-group">
                <input type="text" id="username" placeholder="Kullanıcı Adı" value="taha">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Şifre" value="password123">
            </div>
            <button onclick="login()">Sisteme Giriş Yap</button>
        </div>

        <button class="btn-danger" onclick="getDashboard()" id="dashboard-btn" style="display:none;">Güvenlik Loglarını Aç</button>

        <div id="message"></div>
        <div id="fingerprint-display">Cihaz kimliği doğrulanıyor...</div>

        <div id="dashboard">
            <h3 style="color: #38bdf8; margin-bottom: 10px;">Audit Logs (Canlı)</h3>
            <table>
                <thead><tr><th>Zaman</th><th>Olay</th><th>Kullanıcı/Cihaz</th><th>Durum</th></tr></thead>
                <tbody id="log-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentFingerprint = "";

        async function initFingerprint() {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            currentFingerprint = result.visitorId;
            document.getElementById('fingerprint-display').innerText = "🔑 Hardware ID: " + currentFingerprint;
        }
        initFingerprint();

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            msgDiv.className = ""; msgDiv.innerText = "Doğrulanıyor...";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass, clientFingerprint: currentFingerprint })
                });
                const data = await response.json();
                
                if(response.ok) {
                    msgDiv.className = "success"; msgDiv.innerText = data.message;
                    document.getElementById('dashboard-btn').style.display = "block";
                } else {
                    msgDiv.className = "error"; msgDiv.innerText = data.error;
                }
            } catch (e) {
                msgDiv.className = "error"; msgDiv.innerText = "Sunucu bağlantı hatası!";
            }
        }

        async function getDashboard() {
            const msgDiv = document.getElementById('message');
            try {
                const response = await fetch('/api/dashboard', {
                    method: 'GET',
                    headers: { 'x-device-fingerprint': currentFingerprint } 
                });
                const data = await response.json();
                
                if(response.ok) {
                    document.getElementById('main-container').classList.add('expanded');
                    document.getElementById('dashboard').style.display = "block";
                    msgDiv.innerText = "";
                    
                    // Logları Tabloya Bas
                    const tbody = document.getElementById('log-table-body');
                    tbody.innerHTML = "";
                    data.logs.forEach(log => {
                        tbody.innerHTML += `<tr><td>${log.time}</td><td>${log.event}</td><td>${log.user}</td><td>${log.status}</td></tr>`;
                    });
                } else {
                    msgDiv.className = "error"; msgDiv.innerText = data.error;
                }
            } catch (e) {
                msgDiv.className = "error"; msgDiv.innerText = "Panel açılamadı!";
            }
        }
    </script>
</body>
</html>
